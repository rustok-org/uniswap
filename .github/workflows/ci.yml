name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (tsc --noEmit, strict)
        run: npm run build
      - name: Test (vitest)
        run: npm test
      - name: Format (prettier --check)
        run: npm run format
      - name: License gate (permissive-only allowlist — mirror of cargo deny)
        run: npm run license:check
